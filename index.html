<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

    <title>Eris</title>
</head>
<body>
    <h1 class="tech-font heading">Eris</h1>

    <div class="text_input_box tech-font">
        <p style="text-align: center; font-size: 25px;">Enter data</p>

        NAME: <input id="name" class="text_input" type="text">
        <br>
        ID: <input id="id" class="text_input" type="text">
        <br><br>

        <button id="submitButton">Submit your data to ERIS</button>
    </div>

    <div class="results">
        <h1 class="tech-font heading">Results</h1>
        <div class="resultsBox" id="resultsBox"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
